# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
# Pass Shift+Enter through to applications (e.g. Claude Code newline)
bind-key -T root S-Enter send-keys Escape "[13;2u"
set -g base-index 1
set -g pane-base-index 1

# Vi mode for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize mode: prefix + r enters resize table, then use vim keys
bind r switch-client -T resize
bind -T resize h resize-pane -L 5
bind -T resize j resize-pane -D 5
bind -T resize k resize-pane -U 5
bind -T resize l resize-pane -R 5
bind -T resize \\ select-layout even-horizontal
bind -T resize - select-layout even-vertical

# New splits inherit current pane's directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Show window name instead of hostname
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Highlight windows that send a bell (e.g. Claude Code finishing)
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W#{?#{m:*Claude Code,#{pane_title}}, #{?window_bell_flag,❗,#{?#{m/ri:^[✳],#{pane_title}},✔,⏳}},#{?window_bell_flag, ❗,}}"
set -g @catppuccin_window_current_text " #W#{?#{m:*Claude Code,#{pane_title}}, #{?#{m/ri:^[✳],#{pane_title}},✔,⏳},}"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Fix command-line contrast
set -g message-style "fg=#cdd6f4,bg=#313244,bold"
set -g message-command-style "fg=#cdd6f4,bg=#313244,bold"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ------------------
# Plugins
# ------------------
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Continuous saving of tmux environment. Automatic restore when tmux is started. Automatic tmux start when computer is turned on.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'ghostty'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
