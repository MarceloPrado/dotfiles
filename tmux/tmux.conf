# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
# Pass Shift+Enter through to applications (e.g. Claude Code newline)
bind-key -T root S-Enter send-keys Escape "[13;2u"
set -g base-index 1
set -g pane-base-index 1

# New splits inherit current pane's directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Show window name instead of hostname
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Highlight windows that send a bell (e.g. Claude Code finishing)
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W#{?window_bell_flag, ❗,}"
set -g @catppuccin_window_current_text " #W"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Fix command-line contrast
set -g message-style "fg=#cdd6f4,bg=#313244,bold"
set -g message-command-style "fg=#cdd6f4,bg=#313244,bold"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
